# Custom documentation for Steam API methods
# Format: [InterfaceName.MethodName]

[ISteamUserStats.GetStat]
description = "Gets the current value of a stat. The stat must be set as an integer. For float stats, use GetStatFloat."
notes = [
    "The stat 'API Name' must exist in App Admin on Steamworks",
    "For other users' stats, use GetUserStat (currently not implemented)"
]

[ISteamUserStats.SetStat]
description = "Sets the value of a stat for the current user. This only modifies in-memory state - call StoreStats() to persist."

[ISteamUserStats.StoreStats]
description = "Stores the current stats and achievements on the server. This will cause a callback when complete."
example = """
Steam.userStats.setStatInt('kills', 100)
Steam.userStats.storeStats()
"""

[ISteamUserStats.GetAchievement]
description = "Gets the unlock status of an Achievement."
param_descriptions = { pchName = "The 'API Name' of the achievement" }

[ISteamUserStats.SetAchievement]
description = "Unlocks an achievement. Call StoreStats() to persist."
param_descriptions = { pchName = "The 'API Name' of the achievement" }

[ISteamUserStats.FindLeaderboard]
description = "Asynchronously finds a leaderboard by name."
example = """
local call = Steam.userStats.findLeaderboard('TopScores')
Steam.userStats.onLeaderboardFindResult = function(data)
    if data.m_bLeaderboardFound == 1 then
        print('Found leaderboard:', data.m_hSteamLeaderboard)
    end
end
"""

[ISteamUserStats.UploadLeaderboardScore]
description = "Uploads a user score to a specified leaderboard."
param_descriptions = { hSteamLeaderboard = "Handle to the leaderboard", eLeaderboardUploadScoreMethod = "Upload method (see ELeaderboardUploadScoreMethod)", nScore = "The score to upload", pScoreDetails = "Optional table of score details (integers)" }
example = """
local details = {100, 200, 300}  -- Optional score details
local call = Steam.userStats.uploadLeaderboardScore(
    leaderboardHandle,
    Steam.k_ELeaderboardUploadScoreMethodKeepBest,
    9999,
    details
)
"""

[ISteamFriends.GetPersonaName]
description = "Gets the current user's persona (display) name."

[ISteamFriends.SetRichPresence]
description = "Sets a Rich Presence key/value for the current user that is shared with friends."
param_descriptions = { pchKey = "The Rich Presence key to set", pchValue = "The value to associate with the key" }

[ISteamUser.GetSteamID]
description = "Returns the CSteamID of the account currently logged in to the Steam client."

[ISteamApps.BIsSubscribedApp]
description = "Checks if the user owns a specific piece of Downloadable Content (DLC)."
param_descriptions = { appID = "The App ID of the DLC" }

[ISteamUGC.CreateQueryUserUGCRequest]
description = "Creates a query to retrieve the details for user-generated content (UGC)."
param_descriptions = { unAccountID = "The account ID to query", eListType = "The type of list to query", eMatchingUGCType = "The type of UGC to match", eSortOrder = "How to sort the results", nCreatorAppID = "The app that created the items", nConsumerAppID = "The app that will consume the items", unPage = "The page number of results to retrieve (starts at 1)" }

# =============================================================================
# Manual function documentation
# Format: [manual.IInterfaceName.MethodName]
# params/returns are arrays of {name, ptype, description} tables.
# steamworks: optional URL override; defaults to the standard partner.steamgames.com URL.
# signature_differences: list of strings describing how the Lua signature differs from C++.
# =============================================================================

[manual.ISteamClient.SetWarningMessageHook]
description = "Sets a callback to receive Steam API warning and info messages."
notes = ["Also available as ``Steam.GameServerClient.SetWarningMessageHook`` with identical signature."]
steamworks = "https://partner.steamgames.com/doc/api/ISteamClient#SetWarningMessageHook"
signature_differences = [
    "The C++ ``SteamAPIWarningMessageHook_t`` function pointer is replaced by a Lua function.",
    "Pass ``nil`` instead of ``nullptr`` to clear the hook."
]

[[manual.ISteamClient.SetWarningMessageHook.params]]
name = "callback"
ptype = "function or nil"
description = "Function receiving ``(severity: integer, message: string)``. Pass ``nil`` to clear the hook."

[manual.ISteamNetworkingUtils.AllocateMessage]
description = "Allocates a SteamNetworkingMessage_t for use with SendMessages. Set ``m_conn``, ``m_nFlags``, and write to ``m_pData`` before passing to SendMessages."
steamworks = "https://partner.steamgames.com/doc/api/ISteamNetworkingUtils#AllocateMessage"
signature_differences = [
    "The returned ``SteamNetworkingMessage_t *`` pointer is wrapped in a Lua userdata object."
]

[[manual.ISteamNetworkingUtils.AllocateMessage.params]]
name = "cbAllocateBuffer"
ptype = "integer"
description = "Number of bytes to allocate in the message payload buffer."

[[manual.ISteamNetworkingUtils.AllocateMessage.returns]]
ptype = "SteamNetworkingMessage_t"
description = "New message userdata with a pre-allocated payload buffer."

