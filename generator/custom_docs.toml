[manual.ISteamNetworkingSockets.ReceiveMessagesOnConnection]
description = "Receives messages that have been sent to a connection."
notes = ["``Steam.NetworkingSockets`` routes to the game server networking interface when a game server is active."]
steamworks = "https://partner.steamgames.com/doc/api/ISteamNetworkingSockets#ReceiveMessagesOnConnection"
signature_differences = [
    "The C++ output parameter ``ppOutMessages`` is removed; the received messages are returned as a second return value instead.",
    "The C++ ``int`` return is kept as the first return value."
]

[[manual.ISteamNetworkingSockets.ReceiveMessagesOnConnection.params]]
name = "hConn"
ptype = "integer"
description = "Connection handle."

[[manual.ISteamNetworkingSockets.ReceiveMessagesOnConnection.params]]
name = "nMaxMessages"
ptype = "integer"
description = "Maximum number of messages to receive."

[[manual.ISteamNetworkingSockets.ReceiveMessagesOnConnection.returns]]
ptype = "integer"
description = "Number of messages received, or a negative EResult on error."

[[manual.ISteamNetworkingSockets.ReceiveMessagesOnConnection.returns]]
ptype = "SteamNetworkingMessage_t[]"
description = "Table of received message userdata objects (length = number of messages received)."

[manual.ISteamNetworkingSockets.ReceiveMessagesOnPollGroup]
description = "Receives messages that have arrived on any connection in a poll group."
notes = ["``Steam.NetworkingSockets`` routes to the game server networking interface when a game server is active."]
steamworks = "https://partner.steamgames.com/doc/api/ISteamNetworkingSockets#ReceiveMessagesOnPollGroup"
signature_differences = [
    "The C++ output parameter ``ppOutMessages`` is removed; the received messages are returned as a second return value instead.",
    "The C++ ``int`` return is kept as the first return value."
]

[[manual.ISteamNetworkingSockets.ReceiveMessagesOnPollGroup.params]]
name = "hPollGroup"
ptype = "integer"
description = "Poll group handle."

[[manual.ISteamNetworkingSockets.ReceiveMessagesOnPollGroup.params]]
name = "nMaxMessages"
ptype = "integer"
description = "Maximum number of messages to receive."

[[manual.ISteamNetworkingSockets.ReceiveMessagesOnPollGroup.returns]]
ptype = "integer"
description = "Number of messages received, or a negative EResult on error."

[[manual.ISteamNetworkingSockets.ReceiveMessagesOnPollGroup.returns]]
ptype = "SteamNetworkingMessage_t[]"
description = "Table of received message userdata objects (length = number of messages received)."

[manual.ISteamNetworkingSockets.SendMessages]
description = "Sends one or more messages to one or more connections in a single call."
notes = ["``Steam.NetworkingSockets`` routes to the game server networking interface when a game server is active."]
steamworks = "https://partner.steamgames.com/doc/api/ISteamNetworkingSockets#SendMessages"
signature_differences = [
    "The C++ output parameter ``pOutMessageNumberOrResult`` is removed; its values are returned as a table instead.",
    "The C++ return type is ``void``; the message number/result table is the only return value."
]

[[manual.ISteamNetworkingSockets.SendMessages.params]]
name = "nMessages"
ptype = "integer"
description = "Number of messages to send."

[[manual.ISteamNetworkingSockets.SendMessages.params]]
name = "pMessages"
ptype = "SteamNetworkingMessage_t[]"
description = "Table of SteamNetworkingMessage_t userdata objects to send."

[[manual.ISteamNetworkingSockets.SendMessages.returns]]
ptype = "integer[]"
description = "Table of per-message results: positive = message number assigned, negative = EResult error code."
